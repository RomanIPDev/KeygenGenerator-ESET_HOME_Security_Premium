name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: '${{ matrix.os }}'
    name: 'Test: ${{ matrix.os }}'
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install WireGuard
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq --no-install-recommends wireguard-tools
          echo '${{ secrets.WG_CONFIG_MARS_GITHUB }}'| sudo tee /etc/wireguard/wg-client.conf
          sudo systemctl start wg-quick@wg-client.service
          sudo wg
      - name: Check whoami
        run: |
          whoami
      - name: Check $HOME
        run: |
          echo $HOME
          ls -la $HOME    
      - name: Check github.action_path
        run: |
          echo ${{ github.action_path }}
          ls -la ${{ github.action_path }}
      - name: Check github.workspace
        run: |    
          echo ${{ github.workspace }} 
          ls -la ${{ github.workspace }}
      - name: Check runner.workspace
        run: |          
          echo ${{ runner.workspace }}
          ls -la ${{ runner.workspace }}
      - name: Check version
        run: |
          uname -a
          wg --version
          ssh -V
          rsync --version
          git --version      
      - name: Check ping
        run: ping -W 10 -c 5 -- 192.168.0.228
      - name: create ssh
        run: |
          mkdir -p $HOME/.ssh
          echo '${{ secrets.SSH_PRIV_OPEN_TO_GITHUB }}'| sudo tee $HOME/.ssh/id_ed25519-open-to-github
          ls -la $HOME/.ssh/
      - name: create ssh config
        run: |
          echo '${{ secrets.SSH_CONFIG_MARS_LAPTOP_VKROTOV }}'| sudo tee $HOME/.ssh/config
      - name: Check ssh connect
        run: |
            ssh -v mars_laptop_vkrotov 'whoami && dir'
            ssh -v MIR-SRV-CV-01 'whoami && ls -la'
      - name: rsync
        run: |
            rsync -avh --delete --progress ${{ github.workspace }}/nginx.yaml MIR-SRV-CV-01:~
            ssh -v MIR-SRV-CV-01 'ls -la'
              
